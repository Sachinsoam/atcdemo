apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-web-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: static-web-app
  template:
    metadata:
      labels:
        app: static-web-app
    spec:
      containers:
      - name: static-web-container
        image: public.ecr.aws/w1o1o0f7/atcdemo:v1 # Replace with your ECR image URL
        ports:
        - containerPort: 80
